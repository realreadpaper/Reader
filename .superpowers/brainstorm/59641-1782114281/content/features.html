<h2>核心功能优先级</h2>
<p class="subtitle">以下功能中，哪些是你必须有的？（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="bookmark" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>书签</h3>
      <p>记录阅读位置，随时回到上次读到的地方</p>
    </div>
  </div>
  <div class="option" data-choice="highlight" onclick="toggleSelect(this)">
    <div class="letter">H</div>
    <div class="content">
      <h3>高亮/标注</h3>
      <p>选中文字进行颜色高亮，添加批注笔记</p>
    </div>
  </div>
  <div class="option" data-choice="search" onclick="toggleSelect(this)">
    <div class="letter">S</div>
    <div class="content">
      <h3>全文搜索</h3>
      <p>在书中快速搜索关键词，跳转到对应位置</p>
    </div>
  </div>
  <div class="option" data-choice="toc" onclick="toggleSelect(this)">
    <div class="letter">T</div>
    <div class="content">
      <h3>目录导航</h3>
      <p>通过目录快速跳转到指定章节</p>
    </div>
  </div>
  <div class="option" data-choice="font" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>字体/排版自定义</h3>
      <p>调整字体大小、行距、背景色、暗黑模式</p>
    </div>
  </div>
  <div class="option" data-choice="collection" onclick="toggleSelect(this)">
    <div class="letter">L</div>
    <div class="content">
      <h3>书架管理</h3>
      <p>分类整理书籍，按标签/文件夹分组</p>
    </div>
  </div>
</div>
