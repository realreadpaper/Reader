<h2>键盘快捷键</h2>
p class="subtitle">高频操作的键盘快捷方式</p>

<div class="mockup">
  <div class="mockup-header">快捷键一览</div>
  <div class="mockup-body" style="padding:16px;background:#f5efe3;font-family:system-ui">
    <table style="width:100%;font-size:12px;border-collapse:collapse">
      <thead>
        <tr style="border-bottom:1px solid #d5c8b0">
          <th style="text-align:left;padding:8px;color:#6b5a40;font-weight:600">操作</th>
          <th style="text-align:left;padding:8px;color:#6b5a40;font-weight:600">快捷键</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">打开文件</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ O</kbd></td>
        </tr>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">全文搜索</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ F</kbd></td>
        </tr>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">添加书签</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ D</kbd></td>
        </tr>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">字体设置</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ T</kbd></td>
        </tr>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">切换侧边栏</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ ⇧ S</kbd></td>
        </tr>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">全屏阅读</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ ⏏</kbd></td>
        </tr>
        <tr style="border-bottom:1px solid #e8dcc8">
          <td style="padding:8px;color:#2e2518">放大字体</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ +</kbd></td>
        </tr>
        <tr>
          <td style="padding:8px;color:#2e2518">缩小字体</td>
          <td style="padding:8px"><kbd style="background:#e8dcc8;padding:2px 6px;border-radius:4px;font-size:11px">⌘ -</kbd></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
