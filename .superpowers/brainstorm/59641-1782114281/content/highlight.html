<h2>高亮/标注交互</h2>
<p class="subtitle">选中文字后的操作流程</p>

<div class="mockup">
  <div class="mockup-header">选中文字 → 弹出操作菜单</div>
  <div class="mockup-body" style="padding:0">
    <div style="height:320px;background:#f5efe3;padding:40px 60px;font-family:system-ui;position:relative">
      <div style="max-width:560px;margin:0 auto">
        <div style="font-size:14px;line-height:2.1;color:#3a3025">
          <p style="margin-bottom:14px;text-indent:2em">每个进程都有自己的地址空间、文件描述符、信号处理器和其他系统资源。</p>
          <p style="margin-bottom:14px;text-indent:2em">
            <span style="background:#c8e0f0;padding:2px 0">操作系统通过<span style="background:#a8c8e8;padding:2px 0;font-weight:600">进程控制块</span>（PCB）来管理进程的状态信息，包括进程ID、进程状态、程序计数器、寄存器值等。</span>
          </p>
        </div>
      </div>
      
      <!-- 弹出菜单 -->
      <div style="position:absolute;top:140px;left:50%;transform:translateX(-50%);background:white;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);padding:8px 6px;display:flex;align-items:center;gap:4px;z-index:10">
        <!-- 高亮颜色 -->
        <div style="display:flex;gap:6px;padding:0 8px;border-right:1px solid #eee">
          <div style="width:22px;height:22px;background:#f5d76e;border-radius:50%;cursor:pointer;border:2px solid #e8c84a" title="黄色"></div>
          <div style="width:22px;height:22px;background:#7ec8a0;border-radius:50%;cursor:pointer;border:2px solid transparent" title="绿色"></div>
          <div style="width:22px;height:22px;background:#e8a87c;border-radius:50%;cursor:pointer;border:2px solid transparent" title="橙色"></div>
          <div style="width:22px;height:22px;background:#a0b8e8;border-radius:50%;cursor:pointer;border:2px solid transparent" title="蓝色"></div>
        </div>
        <!-- 操作按钮 -->
        <div style="display:flex;gap:2px;padding:0 8px">
          <div style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#333;display:flex;align-items:center;gap:4px" title="添加笔记">
            <span>📝</span> 笔记
          </div>
          <div style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#333;display:flex;align-items:center;gap:4px" title="复制">
            <span>📋</span> 复制
          </div>
          <div style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#e05050;display:flex;align-items:center;gap:4px" title="删除">
            <span>🗑</span>
          </div>
        </div>
      </div>
      
      <!-- 说明文字 -->
      <div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:11px;color:#a09080">
        选中文字后自动弹出操作栏：4色高亮 + 笔记 + 复制 + 删除
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:20px">
  <h3>标注管理</h3>
  <p style="color:#666;line-height:1.6;margin-top:8px">侧边栏可切换到「标注」标签页，显示当前书籍的所有高亮和笔记，按章节分组，点击可跳转到对应位置。支持按颜色筛选。</p>
</div>
