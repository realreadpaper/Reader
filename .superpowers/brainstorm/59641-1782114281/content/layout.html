<h2>阅读界面布局</h2>
<p class="subtitle">打开一本书后，主界面应该是怎样的结构？</p>

<div class="split">
  <div class="mockup" data-choice="sidebar" onclick="toggleSelect(this)">
    <div class="mockup-header">A. 侧边栏 + 阅读区</div>
    <div class="mockup-body">
      <div style="display:flex;height:300px;font-family:system-ui;font-size:12px">
        <div style="width:200px;background:#f5f0eb;border-right:1px solid #e0d5c8;padding:12px;flex-shrink:0">
          <div style="font-weight:600;color:#8b7355;margin-bottom:12px">书架</div>
          <div style="background:#ece5dc;border-radius:6px;padding:8px;margin-bottom:6px;color:#5a4a3a">《深入理解计算机》</div>
          <div style="padding:8px;color:#8b7355">《百年孤独》</div>
          <div style="padding:8px;color:#8b7355">《设计心理学》</div>
          <div style="margin-top:20px;font-weight:600;color:#8b7355;margin-bottom:12px">目录</div>
          <div style="padding:4px 8px;color:#5a4a3a;font-size:11px">第一章 引言</div>
          <div style="padding:4px 8px;color:#8b7355;font-size:11px">第二章 进程</div>
          <div style="padding:4px 8px;color:#8b7355;font-size:11px">第三章 内存</div>
        </div>
        <div style="flex:1;background:#faf5ef;padding:30px 40px">
          <div style="width:60%;margin:0 auto">
            <div style="font-size:18px;font-weight:600;color:#3a3025;margin-bottom:16px">第二章 进程</div>
            <div style="font-size:13px;line-height:2;color:#5a4a3a">
              <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:100%"></div>
              <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:95%"></div>
              <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:100%"></div>
              <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:88%"></div>
              <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:100%"></div>
              <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:92%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="mockup" data-choice="clean" onclick="toggleSelect(this)">
    <div class="mockup-header">B. 纯净全屏阅读</div>
    <div class="mockup-body">
      <div style="height:300px;background:#faf5ef;padding:30px 50px;font-family:system-ui;font-size:12px">
        <div style="width:65%;margin:0 auto">
          <div style="font-size:18px;font-weight:600;color:#3a3025;margin-bottom:16px">第二章 进程</div>
          <div style="font-size:13px;line-height:2;color:#5a4a3a">
            <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:100%"></div>
            <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:95%"></div>
            <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:100%"></div>
            <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:88%"></div>
            <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:100%"></div>
            <div style="height:8px;background:#e0d5c8;border-radius:3px;margin-bottom:6px;width:92%"></div>
          </div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0 50px;font-size:11px;color:#b0a090">
        <span>第二章 进程 · 23%</span>
        <span>42 / 186</span>
      </div>
    </div>
  </div>
</div>
