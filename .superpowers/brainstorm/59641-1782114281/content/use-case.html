<h2>主要使用场景</h2>
<p class="subtitle">你最常使用这款阅读器来读什么？</p>

<div class="options">
  <div class="option" data-choice="novels" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>小说/文学作品</h3>
      <p>长时间连续阅读，注重排版舒适度和翻页体验</p>
    </div>
  </div>
  <div class="option" data-choice="textbooks" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>技术文档/教科书</h3>
      <p>需要快速定位、高亮标注、目录导航、交叉引用</p>
    </div>
  </div>
  <div class="option" data-choice="mixed" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合使用</h3>
      <p>既看小说也看文档，希望一款应用覆盖所有需求</p>
    </div>
  </div>
</div>
