<h2>界面风格</h2>
<p class="subtitle">你更喜欢哪种整体设计风格？</p>

<div class="cards">
  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#fafafa;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;min-height:180px">
      <div style="width:90%;height:8px;background:#e5e5e5;border-radius:4px;margin-bottom:8px"></div>
      <div style="width:70%;height:8px;background:#eee;border-radius:4px;margin-bottom:16px"></div>
      <div style="width:100%;height:60%;background:#f0f0f0;border-radius:6px"></div>
    </div>
    <div class="card-body">
      <h3>极简主义</h3>
      <p>Apple Notes 风格，大量留白，内容至上，几乎无边框和装饰</p>
    </div>
  </div>
  <div class="card" data-choice="warm" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f5f0eb;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;min-height:180px">
      <div style="width:90%;height:8px;background:#d4c5b5;border-radius:4px;margin-bottom:8px"></div>
      <div style="width:70%;height:8px;background:#e0d5c8;border-radius:4px;margin-bottom:16px"></div>
      <div style="width:100%;height:60%;background:#ece5dc;border-radius:6px"></div>
    </div>
    <div class="card-body">
      <h3>温暖纸质</h3>
      <p>Kindle/实体书质感，暖色调，模拟纸张触感，护眼舒适</p>
    </div>
  </div>
  <div class="card" data-choice="modern" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;min-height:180px">
      <div style="width:90%;height:8px;background:#333355;border-radius:4px;margin-bottom:8px"></div>
      <div style="width:70%;height:8px;background:#2a2a45;border-radius:4px;margin-bottom:16px"></div>
      <div style="width:100%;height:60%;background:#222240;border-radius:6px"></div>
    </div>
    <div class="card-body">
      <h3>现代暗黑</h3>
      <p>深色主题为主，霓虹点缀，科技感强，适合夜间阅读</p>
    </div>
  </div>
</div>
