<h2>其他核心交互</h2>
<p class="subtitle">搜索、字体设置、书签的交互设计</p>

<div class="split">
  <!-- 搜索 -->
  <div class="mockup">
    <div class="mockup-header">全文搜索</div>
    <div class="mockup-body" style="padding:0">
      <div style="background:#f5efe3;font-family:system-ui;height:260px;display:flex;flex-direction:column">
        <!-- 搜索栏 -->
        <div style="padding:10px 16px;background:#e8dcc8;display:flex;gap:8px;align-items:center">
          <div style="flex:1;background:#f5efe3;border-radius:6px;padding:6px 10px;font-size:12px;color:#2e2518;display:flex;align-items:center;gap:6px">
            <span style="color:#8a7a60">🔍</span>
            <span>进程控制块</span>
            <span style="margin-left:auto;color:#8a7a60;font-size:10px">3/12</span>
          </div>
          <span style="font-size:11px;color:#8a7a60;cursor:pointer">▲</span>
          <span style="font-size:11px;color:#8a7a60;cursor:pointer">▼</span>
          <span style="font-size:11px;color:#8a7a60;cursor:pointer">✕</span>
        </div>
        <!-- 搜索结果 -->
        <div style="flex:1;overflow-y:auto;padding:8px 0">
          <div style="padding:8px 16px;background:#e8d5a0;border-left:3px solid #8b7355;margin:0 8px;border-radius:0 4px 4px 0">
            <div style="font-size:11px;font-weight:600;color:#2e2518">第二章 进程 · 第 23 页</div>
            <div style="font-size:10px;color:#5a4a35;margin-top:3px">...操作系统通过<b style="color:#8b4513">进程控制块</b>（PCB）来管理进程的状态...</div>
          </div>
          <div style="padding:8px 16px;margin:4px 8px;border-radius:0 4px 4px 0">
            <div style="font-size:11px;color:#8a7a60">第三章 内存 · 第 45 页</div>
            <div style="font-size:10px;color:#8a7a60;margin-top:3px">...每个<b style="color:#8b4513">进程控制块</b>包含进程的优先级信息...</div>
          </div>
          <div style="padding:8px 16px;margin:4px 8px;border-radius:0 4px 4px 0">
            <div style="font-size:11px;color:#8a7a60">第五章 并发 · 第 89 页</div>
            <div style="font-size:10px;color:#8a7a60;margin-top:3px">...线程共享所属进程的<b style="color:#8b4513">进程控制块</b>...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 字体设置 -->
  <div class="mockup">
    <div class="mockup-header">字体/排版设置面板</div>
    <div class="mockup-body" style="padding:0">
      <div style="background:#e8dcc8;padding:16px;font-family:system-ui;height:260px;display:flex;flex-direction:column;gap:16px">
        
        <!-- 字体大小 -->
        <div>
          <div style="font-size:11px;color:#6b5a40;font-weight:600;margin-bottom:8px">字体大小</div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:14px;color:#8a7a60;cursor:pointer">A-</span>
            <div style="flex:1;height:4px;background:#d5c8b0;border-radius:2px;position:relative">
              <div style="position:absolute;left:40%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#8b7355;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.2)"></div>
            </div>
            <span style="font-size:18px;color:#8a7a60;cursor:pointer">A+</span>
          </div>
        </div>
        
        <!-- 行距 -->
        <div>
          <div style="font-size:11px;color:#6b5a40;font-weight:600;margin-bottom:8px">行距</div>
          <div style="display:flex;gap:6px">
            <div style="padding:5px 12px;background:#d5c8b0;border-radius:6px;font-size:10px;color:#2e2518;cursor:pointer">1.5</div>
            <div style="padding:5px 12px;background:#8b7355;color:white;border-radius:6px;font-size:10px;cursor:pointer">1.8</div>
            <div style="padding:5px 12px;background:#d5c8b0;border-radius:6px;font-size:10px;color:#2e2518;cursor:pointer">2.0</div>
            <div style="padding:5px 12px;background:#d5c8b0;border-radius:6px;font-size:10px;color:#2e2518;cursor:pointer">2.2</div>
          </div>
        </div>
        
        <!-- 主题切换 -->
        <div>
          <div style="font-size:11px;color:#6b5a40;font-weight:600;margin-bottom:8px">主题</div>
          <div style="display:flex;gap:8px">
            <div style="text-align:center;cursor:pointer">
              <div style="width:40px;height:40px;background:#f5efe3;border:2px solid #8b7355;border-radius:8px"></div>
              <div style="font-size:9px;color:#2e2518;margin-top:4px">经典</div>
            </div>
            <div style="text-align:center;cursor:pointer">
              <div style="width:40px;height:40px;background:#e8dcc8;border:2px solid transparent;border-radius:8px"></div>
              <div style="font-size:9px;color:#8a7a60;margin-top:4px">牛皮纸</div>
            </div>
            <div style="text-align:center;cursor:pointer">
              <div style="width:40px;height:40px;background:#1e1a15;border:2px solid transparent;border-radius:8px"></div>
              <div style="font-size:9px;color:#8a7a60;margin-top:4px">夜间</div>
            </div>
            <div style="text-align:center;cursor:pointer">
              <div style="width:40px;height:40px;background:#d5e8d0;border:2px solid transparent;border-radius:8px"></div>
              <div style="font-size:9px;color:#8a7a60;margin-top:4px">护眼</div>
            </div>
          </div>
        </div>
        
        <!-- 字体选择 -->
        <div>
          <div style="font-size:11px;color:#6b5a40;font-weight:600;margin-bottom:8px">字体</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <div style="padding:4px 10px;background:#8b7355;color:white;border-radius:5px;font-size:10px;cursor:pointer">系统默认</div>
            <div style="padding:4px 10px;background:#d5c8b0;border-radius:5px;font-size:10px;color:#2e2518;cursor:pointer;font-family:serif">宋体</div>
            <div style="padding:4px 10px;background:#d5c8b0;border-radius:5px;font-size:10px;color:#2e2518;cursor:pointer">苹方</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
