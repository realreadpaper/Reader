name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.0.0'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "READER_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "READER_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Package Release DMG
        run: |
          VERSION="$READER_VERSION" scripts/package_release.sh all

      - name: Verify DMG Layout
        run: |
          scripts/verify_dmg.sh "dist/Reader-$READER_VERSION-arm64.dmg"
          scripts/verify_dmg.sh "dist/Reader-$READER_VERSION-x86_64.dmg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reader-macOS-release
          path: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
