name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild -project Reader.xcodeproj \
            -scheme Reader \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS,arch=arm64' \
            build

      - name: Strip & Package
        run: |
          strip -rSTx build/Build/Products/Release/Reader.app/Contents/MacOS/Reader
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Reader.app ../../../Reader-macOS-arm64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reader-macOS
          path: build/Reader-macOS-arm64.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Reader-macOS-arm64.zip
          generate_release_notes: true
