<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF6EF"/>
      <stop offset="100%" style="stop-color:#E8DCC8"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="100%" style="stop-color:#6B5A40"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#F5EFE3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#5A4A3A" flood-opacity="0.35"/>
    </filter>
    <filter id="bookShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3A2A1A" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 圆角背景 -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  
  <!-- 背景纹理 -->
  <g opacity="0.03">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#8B7355"/>
    </pattern>
    <rect width="1024" height="1024" rx="228" ry="228" fill="url(#dots)"/>
  </g>
  
  <!-- 装饰弧线 -->
  <g opacity="0.06" stroke="#8B7355" stroke-width="3" fill="none">
    <circle cx="512" cy="480" r="320"/>
    <circle cx="512" cy="480" r="280"/>
  </g>
  
  <!-- 主书本组 -->
  <g transform="translate(512, 460)" filter="url(#shadow)">
    
    <!-- 最后的书 - 竖立 -->
    <g transform="translate(-120, 20) rotate(-8)">
      <rect x="-35" y="-130" width="70" height="260" rx="3" fill="url(#book)" filter="url(#bookShadow)"/>
      <rect x="-32" y="-127" width="64" height="254" rx="2" fill="#7A6548"/>
      <!-- 书脊装饰线 -->
      <line x1="-25" y1="-100" x2="25" y2="-100" stroke="#A08060" stroke-width="1.5" opacity="0.6"/>
      <line x1="-25" y1="-80" x2="20" y2="-80" stroke="#A08060" stroke-width="1.5" opacity="0.6"/>
      <line x1="-25" y1="80" x2="25" y2="80" stroke="#A08060" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- 中间的书 - 竖立 -->
    <g transform="translate(-40, 0) rotate(-3)">
      <rect x="-38" y="-145" width="76" height="290" rx="3" fill="url(#book)" filter="url(#bookShadow)"/>
      <rect x="-35" y="-142" width="70" height="284" rx="2" fill="#8A7558"/>
      <rect x="-25" y="-110" width="50" height="6" rx="2" fill="#C4A882" opacity="0.5"/>
      <rect x="-25" y="-95" width="40" height="6" rx="2" fill="#C4A882" opacity="0.5"/>
      <rect x="-25" y="-80" width="45" height="6" rx="2" fill="#C4A882" opacity="0.5"/>
    </g>
    
    <!-- 打开的书 -->
    <g transform="translate(60, -10)">
      <!-- 左页 -->
      <g>
        <rect x="-110" y="-150" width="110" height="300" rx="4" fill="#9A8060"/>
        <rect x="-107" y="-147" width="104" height="294" rx="3" fill="url(#page)"/>
        <!-- 左页内容 -->
        <g opacity="0.25" fill="#8B7355">
          <rect x="-90" y="-120" width="75" height="5" rx="2"/>
          <rect x="-90" y="-108" width="65" height="5" rx="2"/>
          <rect x="-90" y="-96" width="70" height="5" rx="2"/>
          <rect x="-90" y="-84" width="55" height="5" rx="2"/>
          <rect x="-90" y="-68" width="75" height="5" rx="2"/>
          <rect x="-90" y="-56" width="50" height="5" rx="2"/>
          <rect x="-90" y="-44" width="65" height="5" rx="2"/>
          <rect x="-90" y="-28" width="70" height="5" rx="2"/>
          <rect x="-90" y="-16" width="45" height="5" rx="2"/>
          <rect x="-90" y="-4" width="60" height="5" rx="2"/>
          <rect x="-90" y="12" width="70" height="5" rx="2"/>
          <rect x="-90" y="24" width="50" height="5" rx="2"/>
        </g>
      </g>
      
      <!-- 右页 -->
      <g>
        <rect x="0" y="-150" width="110" height="300" rx="4" fill="#9A8060"/>
        <rect x="3" y="-147" width="104" height="294" rx="3" fill="url(#page)"/>
        <!-- 右页内容 -->
        <g opacity="0.2" fill="#8B7355">
          <rect x="18" y="-120" width="70" height="5" rx="2"/>
          <rect x="18" y="-108" width="60" height="5" rx="2"/>
          <rect x="18" y="-96" width="65" height="5" rx="2"/>
          <rect x="18" y="-80" width="75" height="5" rx="2"/>
          <rect x="18" y="-68" width="55" height="5" rx="2"/>
          <rect x="18" y="-56" width="65" height="5" rx="2"/>
          <rect x="18" y="-40" width="70" height="5" rx="2"/>
          <rect x="18" y="-28" width="50" height="5" rx="2"/>
          <rect x="18" y="-16" width="60" height="5" rx="2"/>
          <rect x="18" y="-4" width="65" height="5" rx="2"/>
          <rect x="18" y="12" width="70" height="5" rx="2"/>
          <rect x="18" y="24" width="55" height="5" rx="2"/>
        </g>
      </g>
      
      <!-- 书签 -->
      <path d="M 70,-150 L 70,-105 L 82,-118 L 94,-105 L 94,-150 Z" fill="#C75050" opacity="0.9"/>
    </g>
  </g>
  
  <!-- 底部 R 字母装饰 -->
  <text x="512" y="800" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="bold" fill="#8B7355" opacity="0.1">R</text>
  
  <!-- 顶部光晕 -->
  <ellipse cx="512" cy="200" rx="200" ry="80" fill="white" opacity="0.15"/>
</svg>
